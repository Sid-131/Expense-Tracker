upstream backend {
    server backend:8000;
}

# Rate limit zones (defined in http context via include, but nginx:alpine allows in server context via limit_req_zone at top)
# 10 req/s per IP for general API
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# 3 req/min per IP for auth endpoints (stricter)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Auth endpoints — strict rate limit (3 req/min, no burst)
    location ~ ^/api/v1/auth/(login|signup|google|otp) {
        limit_req zone=auth_limit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # All other API — 10 req/s with burst of 20
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://backend/health;
    }
}
